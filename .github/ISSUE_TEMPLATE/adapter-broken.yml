name: Adapter broken
description: Report a provider login, send, response, or session automation regression.
title: "[adapter-broken] "
labels:
  - adapter-broken
body:
  - type: markdown
    attributes:
      value: |
        Use the in-app **Report broken adapter** preview when possible. Never paste cookies, tokens, account details, conversation text, provider HTML, or local profile files.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed account data, conversation text, cookies, tokens, query strings, and provider-page HTML.
          required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - ChatGPT
        - Claude
        - Gemini
        - Grok
    validations:
      required: true
  - type: dropdown
    id: failure
    attributes:
      label: What failed?
      options:
        - Open or login
        - Prompt insertion
        - Automatic send
        - Thinking detection
        - Text response capture
        - Image-only response completion
        - New provider session
        - Other provider automation
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version or commit
      placeholder: v1.0.1 or git commit
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Operating system
      placeholder: Windows 11 24H2, macOS 15.5 Apple Silicon, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: adapter-version
    attributes:
      label: Adapter version
      placeholder: Shown in the in-app diagnostic preview
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized in-app diagnostic preview
      description: Paste only the exact privacy-reviewed adapter report generated by the app.
      render: text
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Describe the smallest repeatable flow using non-sensitive test content.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and observed behavior
    validations:
      required: true
