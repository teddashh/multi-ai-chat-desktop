# Adapted from refs/better-agent-terminal/.github/workflows/release.yml (MIT).
# M6 intentionally drops sidecar, Chocolatey, Homebrew, updater-manifest, and
# lightweight-machine logic. This workflow only reacts to manually pushed v* tags.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact: windows
          - os: macos-latest
            platform: macos
            artifact: macos
          - os: ubuntu-latest
            platform: linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKitGTK build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build injected scripts
        run: pnpm build:injected

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          if [[ -z "$version" || "$version" == "$RELEASE_TAG" ]]; then
            echo "Release tag must start with v and include a version, got: $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-pre(\.[0-9A-Za-z-]+)?)?$ ]]; then
            echo "Release version must be X.Y.Z or X.Y.Z-pre[.N] (only -pre prereleases are supported, matching the prerelease flag), got: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Inject release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs = require('fs'); for (const file of ['package.json', 'src-tauri/tauri.conf.json']) { const data = JSON.parse(fs.readFileSync(file, 'utf8')); data.version = process.env.VERSION; fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n'); }"

      - name: Verify (typecheck + lint + tests + adapters)
        run: pnpm verify

      - name: Build Tauri bundle
        run: pnpm tauri build

      # TODO(signing): Add Windows Authenticode signing here, after Tauri builds
      # the NSIS installer and before artifact upload.
      # TODO(notarization): Add macOS signing and notarization here, after Tauri
      # builds the .dmg and before artifact upload.

      - name: Build Windows portable zip
        if: matrix.platform == 'windows'
        run: pnpm pack:portable -- --input src-tauri/target/release --out dist/portable --name "Multi-AI-Chat-Desktop-${{ steps.version.outputs.version }}-windows-portable.zip"

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            dist/portable/*.zip
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-pre') }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
