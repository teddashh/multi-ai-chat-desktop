# Adapted from refs/better-agent-terminal/.github/workflows/release.yml (MIT).
# M6 intentionally drops sidecar, Chocolatey, Homebrew, updater-manifest, and
# lightweight-machine logic. This workflow only reacts to manually pushed v* tags.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact: windows
          - os: macos-latest
            platform: macos
            artifact: macos
          - os: ubuntu-latest
            platform: linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux WebKitGTK build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build injected scripts
        run: pnpm build:injected

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          if [[ -z "$version" || "$version" == "$RELEASE_TAG" ]]; then
            echo "Release tag must start with v and include a version, got: $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-pre(\.[0-9A-Za-z-]+)?)?$ ]]; then
            echo "Release version must be X.Y.Z or X.Y.Z-pre[.N] (only -pre prereleases are supported, matching the prerelease flag), got: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Inject release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node -e "const fs = require('fs'); for (const file of ['package.json', 'src-tauri/tauri.conf.json']) { const data = JSON.parse(fs.readFileSync(file, 'utf8')); data.version = process.env.VERSION; fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n'); }"

      - name: Verify (typecheck + lint + tests + adapters)
        run: pnpm verify

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

      - name: Build Tauri bundle
        run: pnpm tauri build

      # Apple Silicon requires a valid code signature for browser-downloaded apps.
      # tauri.conf.json uses Tauri's documented ad-hoc identity (`-`) until a
      # Developer ID certificate and notarization credentials are available.
      - name: Verify macOS app signature inside DMG
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          if [[ -z "$dmg" ]]; then
            echo "No macOS DMG found" >&2
            exit 1
          fi

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet >/dev/null 2>&1 || true
            rmdir "$mount_dir" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          app="$(find "$mount_dir" -maxdepth 1 -type d -name '*.app' -print -quit)"
          if [[ -z "$app" ]]; then
            echo "No .app bundle found inside $dmg" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app"
          signature="$(codesign --display --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$signature"
          if ! grep -Eq '^(Signature=adhoc|Authority=Developer ID Application:)' <<<"$signature"; then
            echo "macOS app is neither ad-hoc nor Developer ID signed" >&2
            exit 1
          fi

      # Frozen distribution policy: Windows artifacts remain unsigned and
      # macOS uses ad-hoc signing. GitHub Releases is the manual update channel.

      - name: Build Windows portable zip
        if: matrix.platform == 'windows'
        run: pnpm pack:portable -- --input src-tauri/target/release --out dist/portable --name "Multi-AI-Chat-Desktop-${{ steps.version.outputs.version }}-windows-portable.zip"

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            dist/portable/*.zip
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          # Create a DRAFT release — the maintainer reviews the built artifacts on GitHub and
          # clicks "Publish" manually. The pipeline never auto-publishes.
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-pre') }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
