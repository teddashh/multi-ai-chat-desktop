name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: windows-latest
    outputs:
      adapters: ${{ steps.filter.outputs.adapters }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            adapters:
              - 'adapters/**'
            app:
              - '**'
              - '!adapters/**'

  adapters:
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.adapters == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-adapters.mjs

  frontend:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:injected
      - run: pnpm verify

  # Cross-platform compile + lint gate (M7): proves the Rust app builds against the real
  # WebView2 (Windows), WKWebView (macOS), and WebKitGTK (Linux) SDKs. The document.title
  # transport is cross-platform via Tauri's WebviewBuilder::on_document_title_changed, so this
  # is where mac/linux compilation is actually verified (the dev box is Windows-only).
  cargo-clippy:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Linux WebKitGTK build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          components: clippy
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm agent:verify
      # gen/injected/*.js is gitignored + include_str!'d by the Rust build, so it must be
      # generated before cargo can compile.
      - run: pnpm build:injected
      - run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
